<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Experiment 2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #eeece7;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text-muted: #6b6960; --text-faint: #a8a49c;
    --btn-hover: #eeece7; --danger: #c0392b; --danger-bg: #fdf0ee;
    --full-bg: #eaf3de; --full-border: #639922; --full-text: #3b6d11;
    --b2g1-bg: #fef3dc; --b2g1-border: #c98a1a; --b2g1-text: #7a4f00;
    --bulk-bg: #e6f1fb; --bulk-border: #378add; --bulk-text: #0c447c;
    --trade-bg: #fbeaf0; --trade-border: #d4537e; --trade-text: #72243e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1d1a; --surface2: #28271f;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
      --text: #f0ede6; --text-muted: #9e9a91; --text-faint: #5c5a54;
      --btn-hover: #28271f; --danger: #e05c4a; --danger-bg: #2a1410;
      --full-bg: #173404; --full-border: #639922; --full-text: #c0dd97;
      --b2g1-bg: #2e2206; --b2g1-border: #c98a1a; --b2g1-text: #f5c96a;
      --bulk-bg: #042c53; --bulk-border: #378add; --bulk-text: #b5d4f4;
      --trade-bg: #4b1528; --trade-border: #d4537e; --trade-text: #f4c0d1;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  body { display: flex; flex-direction: column; }

  /* ══════════════════════════════
     TOP 33% — Customer display
  ══════════════════════════════ */
  .customer-zone {
    height: 33vh;
    flex-shrink: 0;
    position: relative;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  /* Default: total view */
  .customer-display {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .customer-display.hidden { opacity: 0; pointer-events: none; }

  .customer-inner {
    transform: rotate(180deg);
    text-align: center;
    width: 100%;
    padding: 0 20px;
  }

  .customer-total {
    font-family: 'DM Mono', monospace;
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 500;
    line-height: 1;
    color: var(--text);
  }

  .customer-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-top: 6px;
  }

  /* Sheet overlay (log/stats) */
  .sheet-overlay {
    position: absolute; inset: 0;
    background: var(--surface);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .sheet-overlay.visible { display: flex; }

  .sheet-inner {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ══════════════════════════════
     BOTTOM 67% — Two columns
  ══════════════════════════════ */
  .work-zone {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left column */
  .col-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .col-left-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* Right column — numpad */
  .col-right {
    width: 44%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 6px;
    background: var(--bg);
  }

  /* ══════════════════════════════
     Deal type tabs
  ══════════════════════════════ */
  .deal-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .deal-tab {
    padding: 12px 4px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    min-height: unset;
  }
  .deal-tab:active { opacity: 0.7; }
  .deal-tab.active-full  { color: var(--full-text);  border-bottom-color: var(--full-border);  background: var(--full-bg); }
  .deal-tab.active-b2g1  { color: var(--b2g1-text);  border-bottom-color: var(--b2g1-border);  background: var(--b2g1-bg); }
  .deal-tab.active-bulk  { color: var(--bulk-text);  border-bottom-color: var(--bulk-border);  background: var(--bulk-bg); }
  .deal-tab.active-trade { color: var(--trade-text); border-bottom-color: var(--trade-border); background: var(--trade-bg); }

  /* ══════════════════════════════
     Context fields
  ══════════════════════════════ */
  .context-zone {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    min-height: 70px;
  }

  .input-display { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .input-row { display: flex; align-items: center; gap: 6px; }

  .input-field-wrap {
    flex: 1; display: flex; align-items: center; gap: 4px;
    background: var(--surface); border: 2px solid var(--border-strong);
    border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: border-color 0.15s;
    min-width: 0;
  }
  .input-field-wrap.focused { border-color: var(--bulk-border); }
  .input-field-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); white-space: nowrap; flex-shrink: 0; }
  .input-field-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); flex: 1; text-align: right; }
  .input-field-value.placeholder { color: var(--text-faint); }

  /* Bulk tiers */
  .bulk-tiers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
  .tier-box { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
  .tier-box-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .tier-box-value { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
  .tier-box-value.placeholder { opacity: 0.35; }
  .tier-box-1 { background: #dbeafe; border-color: #93c5fd; color: #1e3a5f; }
  .tier-box-2 { background: #dcfce7; border-color: #86efac; color: #14532d; }
  .tier-box-3 { background: #fef9c3; border-color: #fde047; color: #422006; }
  .tier-box-4 { background: #ffedd5; border-color: #fdba74; color: #431407; }
  .tier-box-5 { background: #fee2e2; border-color: #fca5a5; color: #450a0a; }
  .tier-box-1.focused { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
  .tier-box-2.focused { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.3); }
  .tier-box-3.focused { border-color: #ca8a04; box-shadow: 0 0 0 3px rgba(202,138,4,0.3); }
  .tier-box-4.focused { border-color: #ea580c; box-shadow: 0 0 0 3px rgba(234,88,12,0.3); }
  .tier-box-5.focused { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.3); }
  @media (prefers-color-scheme: dark) {
    .tier-box-1 { background: #1e3a5f; border-color: #3b82f6; color: #bfdbfe; }
    .tier-box-2 { background: #14532d; border-color: #22c55e; color: #bbf7d0; }
    .tier-box-3 { background: #422006; border-color: #ca8a04; color: #fef08a; }
    .tier-box-4 { background: #431407; border-color: #ea580c; color: #fed7aa; }
    .tier-box-5 { background: #450a0a; border-color: #ef4444; color: #fecaca; }
  }

  .bulk-disc-row { display: flex; align-items: center; gap: 6px; width: 100%; margin-top: 4px; }

  /* ══════════════════════════════
     Tab preview + actions
  ══════════════════════════════ */
  .actions-zone {
    flex: 1;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  .tab-banner { display: none; align-items: center; justify-content: space-between; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; gap: 8px; }
  .tab-banner.visible { display: flex; }
  .tab-banner-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .tab-banner-total { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); }
  .close-tab-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text); cursor: pointer; min-height: unset; white-space: nowrap; }
  .close-tab-btn:active { transform: scale(0.97); }

  .tab-items { display: flex; flex-direction: column; gap: 4px; }
  .tab-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; gap: 6px; }
  .tab-item-left { display: flex; align-items: center; gap: 5px; min-width: 0; flex: 1; flex-wrap: wrap; }
  .tab-item-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .tab-item-amount { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
  .tab-item-chip { font-family: 'DM Mono', monospace; font-size: 9px; padding: 1px 5px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }
  .tab-item-remove { font-size: 11px; padding: 2px 6px; border: none; background: none; color: var(--text-faint); cursor: pointer; border-radius: 4px; min-height: unset; }
  .tab-item-remove:active { color: var(--danger); }
  .tab-total-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--surface2); border-radius: 7px; }
  .tab-total-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); }
  .tab-total-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
  .add-btn { padding: 14px 4px; font-size: 14px; font-weight: 500; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; min-height: 50px; transition: background 0.15s; text-align: center; }
  .add-btn:active { background: var(--btn-hover); transform: scale(0.98); }
  .log-btn { padding: 14px 4px; font-size: 14px; font-weight: 500; border-radius: 10px; border: none; background: var(--text); color: var(--bg); cursor: pointer; min-height: 50px; text-align: center; }
  .log-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ══════════════════════════════
     Numpad
  ══════════════════════════════ */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    flex: 1;
  }

  .numpad-key {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    transition: background 0.1s, transform 0.1s;
  }
  .numpad-key:active { background: var(--surface2); transform: scale(0.94); }
  .numpad-key.key-0 { grid-column: span 2; }
  .numpad-key.key-back { background: var(--surface2); font-size: 18px; }
  .numpad-key.key-back:active { background: var(--danger-bg); color: var(--danger); }
  .numpad-key.key-dot.disabled { opacity: 0.25; pointer-events: none; }

  /* ══════════════════════════════
     Bottom toolbar
  ══════════════════════════════ */
  .toolbar {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .toolbar-tab {
    flex: 1; padding: 12px 4px;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); text-align: center;
    cursor: pointer; border: none; background: transparent;
    border-top: 2px solid transparent; transition: all 0.15s; min-height: unset;
  }
  .toolbar-tab.active { color: var(--text); border-top-color: var(--text); }
  .toolbar-tab:active { background: var(--btn-hover); }

  .toolbar-divider { width: 1px; background: var(--border); align-self: stretch; margin: 6px 0; }

  .toolbar-btn { font-size: 13px; padding: 8px 14px; border-radius: 7px; border: 1px solid var(--border-strong); background: transparent; color: var(--text-muted); cursor: pointer; min-height: unset; margin: 6px; }
  .toolbar-btn:active { background: var(--btn-hover); }

  /* ══════════════════════════════
     Log / Stats sheets
  ══════════════════════════════ */
  .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 3px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }

  .log-header { display: flex; align-items: center; justify-content: space-between; }
  .log-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); }
  .clear-log-btn { font-size: 12px; padding: 4px 10px; border: none; background: none; color: var(--text-faint); min-height: unset; cursor: pointer; border-radius: 6px; }
  .clear-log-btn:active { color: var(--danger); background: var(--danger-bg); }
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; animation: fadeIn 0.15s ease; }
  .log-item-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .log-item-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
  .log-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .log-item-lines { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
  .log-line { display: flex; align-items: center; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); gap: 6px; }
  .log-line-detail { color: var(--text-faint); flex: 1; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
  .deal-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
  .badge-full  { background: var(--full-bg);  color: var(--full-text);  border: 1px solid var(--full-border); }
  .badge-b2g1  { background: var(--b2g1-bg);  color: var(--b2g1-text);  border: 1px solid var(--b2g1-border); }
  .badge-bulk  { background: var(--bulk-bg);  color: var(--bulk-text);  border: 1px solid var(--bulk-border); }
  .badge-trade { background: var(--trade-bg); color: var(--trade-text); border: 1px solid var(--trade-border); }
  .badge-tab   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border-strong); }
  .log-note { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .log-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-faint); }
  .delete-btn { font-size: 13px; padding: 4px 8px; border: none; background: none; color: var(--text-faint); border-radius: 6px; min-width: 28px; min-height: 28px; cursor: pointer; }
  .delete-btn:active { color: var(--danger); background: var(--danger-bg); }
  .empty-log { text-align: center; padding: 2rem 1rem; font-size: 13px; color: var(--text-faint); }
</style>
</head>
<body>

<!-- TOP 33%: Customer zone -->
<div class="customer-zone">
  <!-- Default: total display -->
  <div class="customer-display" id="customer-display">
    <div class="customer-inner">
      <div class="customer-total" id="customer-total">$0.00</div>
      <div class="customer-label" id="customer-label">Your total</div>
    </div>
  </div>

  <!-- Sheet overlay -->
  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet-inner" id="sheet-inner"></div>
  </div>
</div>

<!-- BOTTOM 67%: Work zone -->
<div class="work-zone">

  <!-- Left column -->
  <div class="col-left">
    <div class="col-left-scroll">

      <!-- Deal tabs -->
      <div class="deal-tabs">
        <button class="deal-tab active-full" data-type="full"  onclick="selectDeal('full')">Full</button>
        <button class="deal-tab"             data-type="b2g1"  onclick="selectDeal('b2g1')">B2G1</button>
        <button class="deal-tab"             data-type="bulk"  onclick="selectDeal('bulk')">Bulk</button>
        <button class="deal-tab"             data-type="trade" onclick="selectDeal('trade')">Trade</button>
      </div>

      <!-- Context fields -->
      <div class="context-zone">

        <!-- Full -->
        <div class="input-display" id="ctx-full">
          <div class="input-row">
            <div class="input-field-wrap focused" id="wrap-amount" onclick="focusField('amount')">
              <span class="input-field-label">Amt</span>
              <span class="input-field-value placeholder" id="disp-amount">0.00</span>
            </div>
            <div class="input-field-wrap" id="wrap-discount" onclick="focusField('discount')">
              <span class="input-field-label">Disc</span>
              <span class="input-field-value placeholder" id="disp-discount">0.00</span>
            </div>
          </div>
        </div>

        <!-- B2G1 -->
        <div class="input-display" id="ctx-b2g1" style="display:none">
          <div class="input-row">
            <div class="input-field-wrap focused" id="wrap-b2g1-amount" onclick="focusField('b2g1-amount')">
              <span class="input-field-label">Amt</span>
              <span class="input-field-value placeholder" id="disp-b2g1-amount">0.00</span>
            </div>
            <div class="input-field-wrap" id="wrap-free" onclick="focusField('free')">
              <span class="input-field-label">Free</span>
              <span class="input-field-value placeholder" id="disp-free">0.00</span>
            </div>
          </div>
        </div>

        <!-- Bulk -->
        <div class="input-display" id="ctx-bulk" style="display:none">
          <div class="bulk-tiers">
            <div class="tier-box tier-box-1 focused" id="tier-box-1" onclick="focusField('t1')"><span class="tier-box-label">$1</span><span class="tier-box-value placeholder" id="disp-t1">0</span></div>
            <div class="tier-box tier-box-2" id="tier-box-2" onclick="focusField('t2')"><span class="tier-box-label">$2</span><span class="tier-box-value placeholder" id="disp-t2">0</span></div>
            <div class="tier-box tier-box-3" id="tier-box-3" onclick="focusField('t3')"><span class="tier-box-label">$3</span><span class="tier-box-value placeholder" id="disp-t3">0</span></div>
            <div class="tier-box tier-box-4" id="tier-box-4" onclick="focusField('t4')"><span class="tier-box-label">$4</span><span class="tier-box-value placeholder" id="disp-t4">0</span></div>
            <div class="tier-box tier-box-5" id="tier-box-5" onclick="focusField('t5')"><span class="tier-box-label">$5</span><span class="tier-box-value placeholder" id="disp-t5">0</span></div>
          </div>
          <div class="bulk-disc-row">
            <div class="input-field-wrap" id="wrap-bulk-disc" onclick="focusField('bulk-disc')" style="flex:1">
              <span class="input-field-label">Disc</span>
              <span class="input-field-value placeholder" id="disp-bulk-disc">0.00</span>
            </div>
            <div class="input-field-wrap" style="flex:1;pointer-events:none;opacity:0.6">
              <span class="input-field-label">Total</span>
              <span class="input-field-value" id="disp-bulk-total">0.00</span>
            </div>
          </div>
        </div>

        <!-- Trade -->
        <div class="input-display" id="ctx-trade" style="display:none">
          <div class="input-row">
            <div class="input-field-wrap focused" id="wrap-trade-amount" onclick="focusField('trade-amount')">
              <span class="input-field-label">Amt</span>
              <span class="input-field-value placeholder" id="disp-trade-amount">0.00</span>
            </div>
            <div class="input-field-wrap" id="wrap-trade-given" onclick="focusField('trade-given')">
              <span class="input-field-label">Given</span>
              <span class="input-field-value placeholder" id="disp-trade-given">0.00</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Actions + tab preview -->
      <div class="actions-zone">
        <div class="tab-banner" id="tab-banner">
          <span class="tab-banner-label">Tab</span>
          <span class="tab-banner-total" id="tab-banner-total">$0.00</span>
          <button class="close-tab-btn" onclick="closeTab()">Close tab</button>
        </div>
        <div class="tab-items" id="tab-items-list"></div>
        <div class="tab-total-row" id="tab-total-row" style="display:none">
          <span class="tab-total-label">Tab total</span>
          <span class="tab-total-value" id="tab-total-value">$0.00</span>
        </div>
        <div class="action-row">
          <button class="add-btn" onclick="addToTab()">+ Add to tab</button>
          <button class="log-btn" onclick="logSingle()">Log sale</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Right column: numpad -->
  <div class="col-right">
    <div class="numpad">
      <div class="numpad-key" onclick="numpadPress('7')">7</div>
      <div class="numpad-key" onclick="numpadPress('8')">8</div>
      <div class="numpad-key" onclick="numpadPress('9')">9</div>
      <div class="numpad-key" onclick="numpadPress('4')">4</div>
      <div class="numpad-key" onclick="numpadPress('5')">5</div>
      <div class="numpad-key" onclick="numpadPress('6')">6</div>
      <div class="numpad-key" onclick="numpadPress('1')">1</div>
      <div class="numpad-key" onclick="numpadPress('2')">2</div>
      <div class="numpad-key" onclick="numpadPress('3')">3</div>
      <div class="numpad-key key-0" onclick="numpadPress('0')">0</div>
      <div class="numpad-key key-dot" id="key-dot" onclick="numpadPress('.')">.</div>
      <div class="numpad-key key-back" onclick="numpadPress('back')">⌫</div>
    </div>
  </div>

</div>

<!-- Bottom toolbar -->
<div class="toolbar">
  <button class="toolbar-tab" id="ttab-log"   onclick="switchSheet('log')">Log</button>
  <button class="toolbar-tab" id="ttab-stats" onclick="switchSheet('stats')">Stats</button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" onclick="saveJSON()">Save</button>
  <button class="toolbar-btn" onclick="document.getElementById('load-input').click()">Load</button>
  <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadJSON(event)">
</div>

<script>
  const LS_KEY = 'tcg_exp2_data';
  let sales = [], openTab = [], currentDeal = 'full', activeSheet = null;

  const fields = { amount:'', discount:'', 'b2g1-amount':'', free:'', t1:'', t2:'', t3:'', t4:'', t5:'', 'bulk-disc':'', 'trade-amount':'', 'trade-given':'' };
  const dealDefaultField = { full:'amount', b2g1:'b2g1-amount', bulk:'t1', trade:'trade-amount' };
  let focusedField = 'amount';

  const fieldDisp = { amount:'disp-amount', discount:'disp-discount', 'b2g1-amount':'disp-b2g1-amount', free:'disp-free', t1:'disp-t1', t2:'disp-t2', t3:'disp-t3', t4:'disp-t4', t5:'disp-t5', 'bulk-disc':'disp-bulk-disc', 'trade-amount':'disp-trade-amount', 'trade-given':'disp-trade-given' };
  const fieldWrap = { amount:'wrap-amount', discount:'wrap-discount', 'b2g1-amount':'wrap-b2g1-amount', free:'wrap-free', t1:'tier-box-1', t2:'tier-box-2', t3:'tier-box-3', t4:'tier-box-4', t5:'tier-box-5', 'bulk-disc':'wrap-bulk-disc', 'trade-amount':'wrap-trade-amount', 'trade-given':'wrap-trade-given' };
  const dealLabels = { full:'Full', b2g1:'B2G1', bulk:'Bulk', trade:'Trade' };
  const isBulkTier = f => ['t1','t2','t3','t4','t5'].includes(f);

  function autoSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(sales)); } catch(e) {} }
  function autoLoad() { try { const r=localStorage.getItem(LS_KEY); if(r) sales=JSON.parse(r); } catch(e) {} }

  function focusField(field) {
    Object.values(fieldWrap).forEach(id => { const el=document.getElementById(id); if(el) el.classList.remove('focused'); });
    focusedField = field;
    const el = document.getElementById(fieldWrap[field]);
    if (el) el.classList.add('focused');
  }

  function numpadPress(key) {
    const f = focusedField;
    let val = fields[f] || '';
    const isInt = isBulkTier(f);
    if (key==='back') { val=val.slice(0,-1); }
    else if (key==='.') { if(isInt||val.includes('.')) return; val=val===''?'0.':val+'.'; }
    else {
      if (!isInt&&val.includes('.')) { const p=val.split('.'); if(p[1].length>=2) return; }
      if (!val.includes('.')&&val.replace('-','').length>=5) return;
      val=val+key;
    }
    fields[f]=val;
    updateFieldDisplay(f);
    updateCustomerTotal();
    if (isBulkTier(f)||f==='bulk-disc') updateBulkTotalDisplay();
  }

  function updateFieldDisplay(f) {
    const el=document.getElementById(fieldDisp[f]); if(!el) return;
    const val=fields[f];
    const empty=!val||val===''||val==='0'||val==='0.';
    el.textContent=val||(isBulkTier(f)?'0':'0.00');
    el.classList.toggle('placeholder', empty);
  }

  function getNum(f) { return parseFloat(fields[f])||0; }
  function getInt(f) { return parseInt(fields[f])||0; }

  function updateBulkTotalDisplay() {
    const gross=getInt('t1')+getInt('t2')*2+getInt('t3')*3+getInt('t4')*4+getInt('t5')*5;
    const net=Math.max(0,gross-getNum('bulk-disc'));
    const el=document.getElementById('disp-bulk-total');
    if(el){el.textContent=net.toFixed(2);el.classList.remove('placeholder');}
  }

  function updateCustomerTotal() {
    let net=0;
    if(currentDeal==='full') net=Math.max(0,getNum('amount')-getNum('discount'));
    else if(currentDeal==='b2g1') net=getNum('b2g1-amount');
    else if(currentDeal==='bulk') { const g=getInt('t1')+getInt('t2')*2+getInt('t3')*3+getInt('t4')*4+getInt('t5')*5; net=Math.max(0,g-getNum('bulk-disc')); }
    else if(currentDeal==='trade') net=Math.max(0,getNum('trade-amount')-getNum('trade-given'));
    const tabTotal=openTab.reduce((s,i)=>s+i.amount,0);
    document.getElementById('customer-total').textContent='$'+(tabTotal+net).toFixed(2);
    document.getElementById('customer-label').textContent=openTab.length>0?'Tab total':'Your total';
  }

  function selectDeal(type) {
    currentDeal=type;
    document.querySelectorAll('.deal-tab').forEach(b=>{ b.className='deal-tab'; if(b.dataset.type===type) b.classList.add('active-'+type); });
    ['ctx-full','ctx-b2g1','ctx-bulk','ctx-trade'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('ctx-'+type).style.display='';
    document.getElementById('key-dot').classList.toggle('disabled', type==='bulk');
    focusField(dealDefaultField[type]);
    updateCustomerTotal();
  }

  function buildItem() {
    if(currentDeal==='bulk') {
      const t1=getInt('t1'),t2=getInt('t2'),t3=getInt('t3'),t4=getInt('t4'),t5=getInt('t5');
      const disc=getNum('bulk-disc'), gross=t1+t2*2+t3*3+t4*4+t5*5;
      if(!gross) return null;
      return {type:'bulk',amount:Math.max(0,gross-disc),gross,discount:disc,tiers:[t1,t2,t3,t4,t5],note:''};
    } else if(currentDeal==='full') {
      const amt=getNum('amount'); if(!amt) return null;
      return {type:'full',amount:Math.max(0,amt-getNum('discount')),gross:amt,discount:getNum('discount'),note:''};
    } else if(currentDeal==='b2g1') {
      const amt=getNum('b2g1-amount'); if(!amt) return null;
      return {type:'b2g1',amount:amt,gross:amt,free:getNum('free'),note:''};
    } else if(currentDeal==='trade') {
      const amt=getNum('trade-amount'); if(!amt) return null;
      return {type:'trade',amount:Math.max(0,amt-getNum('trade-given')),gross:amt,tradeGiven:getNum('trade-given'),note:''};
    }
    return null;
  }

  function clearFields() {
    const map={full:['amount','discount'],b2g1:['b2g1-amount','free'],bulk:['t1','t2','t3','t4','t5','bulk-disc'],trade:['trade-amount','trade-given']};
    (map[currentDeal]||[]).forEach(f=>{fields[f]='';updateFieldDisplay(f);});
    if(currentDeal==='bulk'){const el=document.getElementById('disp-bulk-total');if(el){el.textContent='0.00';el.classList.add('placeholder');}}
    focusField(dealDefaultField[currentDeal]);
    updateCustomerTotal();
  }

  function addToTab() {
    const item=buildItem(); if(!item) return;
    item.id=Date.now(); openTab.push(item);
    clearFields(); renderTabPreview();
    document.getElementById('tab-banner').classList.add('visible');
    updateCustomerTotal();
  }

  function removeFromTab(id) {
    openTab=openTab.filter(i=>i.id!==id);
    if(!openTab.length) document.getElementById('tab-banner').classList.remove('visible');
    renderTabPreview(); updateCustomerTotal();
  }

  function closeTab() {
    if(!openTab.length) return;
    const now=new Date(), time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    sales.unshift({id:Date.now(),type:'tab',amount:openTab.reduce((s,i)=>s+i.amount,0),items:[...openTab],time,note:''});
    openTab=[];
    document.getElementById('tab-banner').classList.remove('visible');
    renderTabPreview(); updateCustomerTotal(); renderLog(); updateStats(); autoSave();
  }

  function logSingle() {
    const item=buildItem(); if(!item) return;
    const now=new Date(), time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    sales.unshift({...item,id:Date.now(),time});
    clearFields(); renderLog(); updateStats(); autoSave();
  }

  function renderTabPreview() {
    const list=document.getElementById('tab-items-list');
    const totalRow=document.getElementById('tab-total-row');
    const bannerTotal=document.getElementById('tab-banner-total');
    list.innerHTML='';
    if(!openTab.length){totalRow.style.display='none';return;}
    let total=0;
    openTab.forEach(item=>{
      total+=item.amount;
      const row=document.createElement('div'); row.className='tab-item';
      const left=document.createElement('div'); left.className='tab-item-left';
      const badge=document.createElement('span'); badge.className='deal-badge badge-'+item.type; badge.textContent=dealLabels[item.type];
      left.appendChild(badge);
      if(item.type==='bulk'&&item.tiers) {
        item.tiers.forEach((v,i)=>{
          if(!v) return;
          const chip=document.createElement('span'); chip.className='tab-item-chip';
          chip.textContent=v+'\u00d7$'+(i+1)+'=$'+(v*(i+1));
          left.appendChild(chip);
        });
        if(item.discount>0){const dc=document.createElement('span');dc.className='tab-item-chip';dc.style.cssText='color:var(--danger);border-color:var(--danger);background:var(--danger-bg)';dc.textContent='\u2212$'+item.discount.toFixed(2);left.appendChild(dc);}
      }
      const right=document.createElement('div'); right.className='tab-item-right';
      const amt=document.createElement('span'); amt.className='tab-item-amount'; amt.textContent='$'+item.amount.toFixed(2);
      const rem=document.createElement('button'); rem.className='tab-item-remove'; rem.textContent='\u2715';
      const iid=item.id; rem.onclick=()=>removeFromTab(iid);
      right.appendChild(amt); right.appendChild(rem);
      row.appendChild(left); row.appendChild(right); list.appendChild(row);
    });
    totalRow.style.display='flex';
    document.getElementById('tab-total-value').textContent='$'+total.toFixed(2);
    bannerTotal.textContent='$'+total.toFixed(2);
  }

  // ── Sheet switching ──
  function switchSheet(tab) {
    if (activeSheet === tab) {
      // Tap same tab again = close sheet, show total
      activeSheet = null;
      document.getElementById('sheet-overlay').classList.remove('visible');
      document.getElementById('customer-display').classList.remove('hidden');
      document.getElementById('ttab-log').classList.remove('active');
      document.getElementById('ttab-stats').classList.remove('active');
      return;
    }
    activeSheet = tab;
    document.getElementById('ttab-log').classList.toggle('active', tab==='log');
    document.getElementById('ttab-stats').classList.toggle('active', tab==='stats');
    document.getElementById('customer-display').classList.add('hidden');
    document.getElementById('sheet-overlay').classList.add('visible');
    const inner = document.getElementById('sheet-inner');
    inner.innerHTML = '';
    if (tab==='log') {
      const header=document.createElement('div'); header.className='log-header';
      const title=document.createElement('span'); title.className='log-title'; title.textContent='Sales log';
      const clr=document.createElement('button'); clr.className='clear-log-btn'; clr.textContent='Clear all'; clr.onclick=clearAll;
      header.appendChild(title); header.appendChild(clr); inner.appendChild(header);
      const list=document.createElement('div'); list.className='log-list'; list.id='log-list-sheet';
      inner.appendChild(list);
      renderLogInto(list);
    } else {
      renderStatsInto(inner);
    }
  }

  function renderLogInto(list) {
    list.innerHTML='';
    if(!sales.length){const e=document.createElement('div');e.className='empty-log';e.textContent='No sales logged yet.';list.appendChild(e);return;}
    sales.forEach(sale=>{
      const item=document.createElement('div'); item.className='log-item';
      const header=document.createElement('div'); header.className='log-item-header';
      const left=document.createElement('div'); left.className='log-item-left';
      const badge=document.createElement('span'); badge.className='deal-badge '+(sale.type==='tab'?'badge-tab':'badge-'+sale.type); badge.textContent=sale.type==='tab'?'Tab':dealLabels[sale.type];
      const noteEl=document.createElement('span'); noteEl.className='log-note'; noteEl.textContent=sale.type==='tab'?sale.items.length+' items':(sale.note||'\u2014');
      left.appendChild(badge); left.appendChild(noteEl);
      const right=document.createElement('div'); right.className='log-item-right';
      const amtEl=document.createElement('span'); amtEl.className='log-amount'; amtEl.textContent='$'+sale.amount.toFixed(2); right.appendChild(amtEl);
      const timeEl=document.createElement('span'); timeEl.className='log-time'; timeEl.textContent=sale.time; right.appendChild(timeEl);
      const delBtn=document.createElement('button'); delBtn.className='delete-btn'; delBtn.textContent='\u2715'; delBtn.onclick=()=>{deleteSale(sale.id);};
      right.appendChild(delBtn);
      header.appendChild(left); header.appendChild(right); item.appendChild(header);
      if(sale.type==='tab'&&sale.items&&sale.items.length>0){
        const lines=document.createElement('div'); lines.className='log-item-lines';
        sale.items.forEach(si=>{
          const line=document.createElement('div'); line.className='log-line';
          const lb=document.createElement('span'); lb.className='deal-badge badge-'+si.type; lb.style.fontSize='9px'; lb.textContent=dealLabels[si.type];
          const ld=document.createElement('span'); ld.className='log-line-detail';
          if(si.type==='bulk'&&si.tiers) ld.textContent=si.tiers.map((v,i)=>v?v+'\u00d7$'+(i+1):'').filter(Boolean).join(' ');
          else ld.textContent=si.note||'';
          const la=document.createElement('span'); la.textContent='$'+si.amount.toFixed(2);
          line.appendChild(lb); line.appendChild(ld); line.appendChild(la); lines.appendChild(line);
        });
        item.appendChild(lines);
      } else {
        const ded=[];
        if(sale.discount>0) ded.push('\u2212$'+sale.discount.toFixed(2)+' disc');
        if(sale.free>0) ded.push('\u2212$'+sale.free.toFixed(2)+' free');
        if(sale.tradeGiven>0) ded.push('\u2212$'+sale.tradeGiven.toFixed(2)+' given');
        if(ded.length>0){const lines=document.createElement('div');lines.className='log-item-lines';ded.forEach(d=>{const line=document.createElement('div');line.className='log-line';line.style.justifyContent='flex-end';const s=document.createElement('span');s.className='log-line-detail';s.textContent=d;line.appendChild(s);lines.appendChild(line);});item.appendChild(lines);}
      }
      list.appendChild(item);
    });
  }

  function renderStatsInto(container) {
    const allItems=[];
    sales.forEach(s=>{if(s.type==='tab'&&s.items) s.items.forEach(i=>allItems.push(i)); else allItems.push(s);});
    const trades=allItems.filter(s=>s.type==='trade');
    const tradeNet=trades.reduce((s,i)=>s+(i.amount-(i.tradeGiven||0)),0);
    const nonTrade=allItems.filter(s=>s.type!=='trade').reduce((s,i)=>s+i.amount,0);
    const revenue=nonTrade+tradeNet;
    const freeTotal=allItems.filter(s=>s.type==='b2g1').reduce((s,i)=>s+(i.free||0),0);
    const b2g1Count=allItems.filter(s=>s.type==='b2g1').length;
    const fullSales=allItems.filter(s=>s.type==='full');
    const fullTotal=fullSales.reduce((s,i)=>s+i.amount,0);
    container.innerHTML=`
      <div class="summary">
        <div class="stat"><div class="stat-label">Total revenue</div><div class="stat-value">$${revenue.toFixed(2)}</div><div class="stat-sub">${sales.length} transaction${sales.length===1?'':'s'}</div></div>
        <div class="stat"><div class="stat-label">Free cards given</div><div class="stat-value">$${freeTotal.toFixed(2)}</div><div class="stat-sub">${b2g1Count} B2G1 deal${b2g1Count===1?'':'s'}</div></div>
        <div class="stat"><div class="stat-label">Full price</div><div class="stat-value">$${fullTotal.toFixed(2)}</div><div class="stat-sub">${fullSales.length} sale${fullSales.length===1?'':'s'}</div></div>
        <div class="stat"><div class="stat-label">Trades</div><div class="stat-value">${trades.length}</div><div class="stat-sub">$${tradeNet.toFixed(2)} net</div></div>
      </div>`;
  }

  function renderLog() { if(activeSheet==='log') switchSheet('log'); }
  function updateStats() { if(activeSheet==='stats') switchSheet('stats'); }

  function deleteSale(id) {
    sales=sales.filter(s=>s.id!==id);
    if(activeSheet==='log') { const list=document.getElementById('log-list-sheet'); if(list) renderLogInto(list); }
    autoSave();
  }

  function clearAll() {
    if(!sales.length) return;
    if(!confirm('Clear all sales and cached data? This cannot be undone.')) return;
    sales=[];
    try{localStorage.removeItem(LS_KEY);}catch(e){}
    if(activeSheet) switchSheet(activeSheet);
  }

  function saveJSON() {
    const blob=new Blob([JSON.stringify({sales},null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tcg_exp2.json'; a.click(); URL.revokeObjectURL(a.href);
  }

  function loadJSON(event) {
    const file=event.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{try{const d=JSON.parse(e.target.result);sales=d.sales||[];if(activeSheet)switchSheet(activeSheet);autoSave();}catch{alert("Could not read that file.");}};
    reader.readAsText(file); event.target.value='';
  }

  autoLoad(); selectDeal('full');
</script>
</body>
</html>
